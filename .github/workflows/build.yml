name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: wasm32-unknown-emscripten
            os: ubuntu-latest
    env:
      ULTRAHDR_SKIP_PATCHES: ${{ matrix.os == 'windows-latest' && 1 || 0 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup emsdk
        if: matrix.target == 'wasm32-unknown-emscripten'
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.6
          actions-cache-folder: "emsdk-cache"

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target != 'wasm32-unknown-emscripten'
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Check formatting
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo clippy --workspace --target ${{ matrix.target }} -- -D warnings

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jxr2uhdr-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/jxr2uhdr*
          if-no-files-found: ignore

  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - name: Setup emsdk
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.6
          actions-cache-folder: "emsdk-cache"

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: jxr2uhdr-web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: jxr2uhdr-web

      - name: Build web
        run: pnpm run build
        working-directory: jxr2uhdr-web
